# Wrangler configuration for Logiprime Static Website (Cloudflare Pages)

name = "logiprime-website"
compatibility_date = "2024-01-01"
pages_build_output_dir = "."

# [Optional] KV Namespace binding to store contact requests.
# To use this in production, create a KV namespace using wrangler CLI:
# `npx wrangler kv:namespace create CONTACTS`
# Then uncomment and configure the following lines:
#
# [[kv_namespaces]]
# binding = "CONTACTS"
# id = "your_production_kv_namespace_id"
